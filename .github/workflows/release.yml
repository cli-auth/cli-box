name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.3)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false
      ref:
        description: "Branch, tag, or SHA to build (default: main)"
        default: main

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: cli-auth/cli-box-ui

      - uses: voidzero-dev/setup-vp@v1

      - run: vp install

      - run: vp build

      - uses: actions/upload-artifact@v7
        with:
          name: adminui-dist
          path: dist/

  build-clients:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=$([[ "${{ matrix.goos }}" == "windows" ]] && echo ".exe" || echo "")
          name=cli-box-${{ matrix.goos }}-${{ matrix.goarch }}${ext}
          go build \
            -ldflags "-X main.version=${{ github.event.inputs.version }}" \
            -o bin/${name} \
            ./cmd/cli-box/
          echo "ASSET_NAME=${name}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_NAME }}
          path: bin/${{ env.ASSET_NAME }}

  build-server:
    needs: [build-ui]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/download-artifact@v7
        with:
          name: adminui-dist
          path: internal/adminui/dist/

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          name=server-linux-${{ matrix.goarch }}
          go build \
            -ldflags "-X main.version=${{ github.event.inputs.version }}" \
            -o bin/${name} \
            ./cmd/cli-box-server/
          echo "ASSET_NAME=${name}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_NAME }}
          path: bin/${{ env.ASSET_NAME }}

  release:
    needs: [build-clients, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: '{cli-box*,server-*}'
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || true
          prerelease_flag=$([[ "$PRERELEASE" == "true" ]] && echo "--prerelease" || echo "")
          gh release create "$VERSION" --title "$VERSION" $prerelease_flag artifacts/*
